<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Trabalhando com Tabelas</title>
    <style>
        table {
            width: 100%;
            border-collapse: collapse; /* Faz as bordas ficarem juntas */
            margin-top: 20px;
        }
        th, td {
            border: 1px solid black;
            padding: 10px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2; /* Cor de fundo para o cabeçalho */
        }
    </style>
</head>
<body>

    <h1>Tabela de Conteúdos - ADS</h1>

    <table>
        <thead>
            <tr>
                <th>Matéria</th>
                <th>Tema</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Linguagem de Marcação</td>
                <td>HTML e CSS</td>
                <td>Concluído</td>
            </tr>
            <tr>
                <td>Desenvolvimento Web</td>
                <td>Tabelas e Listas</td>
                <td>Em andamento</td>
            </tr>
        </tbody>
    </table>

</body>
</html>
