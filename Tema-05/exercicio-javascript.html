<!doctype html>
<html lang="pt-BR">
<head>
     <meta charset="utf-8">
     <title>Praticando Javascript - Exercício 1</title>
</head>
<body>
     <script type="text/javascript">
          // 1. Pede os números e usa o parseInt para garantir que sejam números inteiros
          var numero1 = parseInt(prompt("Insira o primeiro número inteiro positivo: "));
          var numero2 = parseInt(prompt("Insira o segundo número inteiro positivo: "));

          // 2. Chama a função para dividir
          var resultadoDivisao = divida(numero1, numero2);

          // 3. Exibe o resultado na caixa de diálogo (alert)
          alert('O resultado da divisão é igual a: ' + resultadoDivisao);

          // 4. Função que realiza a divisão
          function divida(n1, n2) {
               var resultado = 0;
               resultado = n1 / n2;
               return resultado;
          }
     </script>
</body>
</html>
