<!doctype html>
<html lang="pt-BR">
<head>
     <meta charset="utf-8">
     <title>Praticando Javascript - Exercício 1</title>
</head>
<body>
    <script type="text/javascript">
        // A função precisa estar aqui para ser chamada depois
        function divida(n1, n2){
            var resultado = n1 / n2;
            return resultado;
        }

        // CORREÇÃO: Usamos Number() para garantir que o prompt vire número
        var numero1 = Number(prompt("Insira o primeiro número: "));
        var numero2 = Number(prompt("Insira o segundo número: "));

        // Agora a divisão vai funcionar
        var resultadoDivisao = divida(numero1, numero2);

        alert('O resultado da divisão é igual a: ' + resultadoDivisao);
    </script>
</body>
</html>
