<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Estudos ADS - Tema 3 Completo</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f9f9f9; }
        table { border-collapse: collapse; width: 100%; margin-bottom: 20px; background: white; }
        th, td { border: 1px solid #333; padding: 10px; text-align: left; }
        th { background-color: #eee; }
        fieldset { border: 2px solid #007bff; padding: 15px; border-radius: 8px; }
    </style>
</head>
<body>

    <h1>🚀 Meu Aprendizado: Tema 3</h1>

    <h2>1. Tabelas Estruturadas</h2>
    <table>
        <thead>
            <tr>
                <th>Disciplina</th>
                <th>Status</th>
                <th>Nota</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>HTML Básico</td>
                <td>Concluído</td>
                <td>10</td>
            </tr>
            <tr>
                <td>Tabelas e Forms</td>
                <td>Em estudo</td>
                <td>9.5</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td colspan="2">Média Geral</td>
                <td>9.75</td>
            </tr>
        </tfoot>
    </table>

    <h2>2. Mídias (Vídeo e Áudio)</h2>
    <p>Aqui aprendi a usar as tags &lt;video&gt; e &lt;audio&gt; com controles.</p>

    <h2>3. Formulário de Interação</h2>
    <form action="#" method="post">
        <fieldset>
            <legend>Dados Gerais</legend>
            <label>Nome:</label><br>
            <input type="text" minlength="3" required placeholder="Digite seu nome"><br><br>
            
            <label>CPF (apenas números):</label><br>
            <input type="text" pattern="\d{11}" placeholder="Ex: 12345678901"><br><br>
            
            <label>Mensagem:</label><br>
            <textarea rows="4" style="width:100%"></textarea><br><br>
            
            <button type="submit">Enviar Estudo</button>
            <button type="reset">Limpar Form</button>
        </fieldset>
    </form>

</body>
</html>
