<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Trabalhando com Formulários</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        form { max-width: 300px; display: flex; flex-direction: column; }
        label { margin-top: 10px; font-weight: bold; }
        input, textarea { margin-bottom: 10px; padding: 5px; }
        button { background-color: blue; color: white; padding: 10px; border: none; cursor: pointer; }
        button:hover { background-color: darkblue; }
    </style>
</head>
<body>

    <h1>Fale Conosco</h1>

    <form>
        <label for="nome">Nome:</label>
        <input type="text" id="nome" placeholder="Digite seu nome">

        <label for="email">E-mail:</label>
        <input type="email" id="email" placeholder="seuemail@exemplo.com">

        <label for="mensagem">Mensagem:</label>
        <textarea id="mensagem" rows="4"></textarea>

        <button type="submit">Enviar Formulário</button>
    </form>

</body>
</html>
